name: Docker Image CI
on:
  push:
    branches:
      - main
    paths:
      - 'packages/twenty-front/**'
      - 'packages/twenty-shared/**'
      - 'packages/twenty-ui/**'
      - 'packages/twenty-front/Dockerfile'
      - 'yarn.lock'
      - 'package.json'
  workflow_dispatch: # Позволяет запустить вручную с параметрами
    inputs:
      backend_url:
        description: 'URL бэкенда для внедрения в сборку'
        required: true
        default: 'https://api.your-domain.com'
      custom_tag:
        description: 'Тег образа (оставьте пустым для auto)'
        required: false
        default: ''

# Разрешения для пуша в GitHub Container Registry (GHCR)
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/twenty-frontend-static
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=${{ inputs.custom_tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.custom_tag != '' }}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/twenty-front/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Кэширование слоев через GitHub Actions (значительно ускоряет повторные сборки)
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            # Берем из переменной репозитория, или из ручного ввода, или фоллбэк
            REACT_APP_SERVER_BASE_URL=${{ vars.BACKEND_URL }}
            VITE_BUILD_SOURCEMAP=false
